<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6dd4"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8971e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Box/Package icon representing stock -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Box body -->
    <path d="M-100,30 L-100,-60 L0,-110 L100,-60 L100,30 L0,80 Z" fill="white" fill-opacity="0.15"/>
    <path d="M-100,30 L-100,-60 L0,-110 L100,-60 L100,30 L0,80 Z"/>
    <!-- Middle line -->
    <path d="M-100,-60 L0,-10 L100,-60"/>
    <path d="M0,-10 L0,80"/>
    <!-- Gold bar chart overlay -->
    <rect x="20" y="-30" width="18" height="40" rx="4" fill="url(#accent)" stroke="none"/>
    <rect x="46" y="-50" width="18" height="60" rx="4" fill="url(#accent)" stroke="none"/>
    <rect x="72" y="-70" width="18" height="80" rx="4" fill="url(#accent)" stroke="none"/>
  </g>
  <!-- SF text at bottom -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="white" opacity="0.9">SF</text>
</svg>
